<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>認臉大作戰</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Bebas+Neue&display=swap');
:root{
  --bg:#0a0a0f; --surface:#13131a; --border:#2a2a3a;
  --accent:#f0e040; --red:#ff4560; --green:#2ecc71; --muted:#666; --text:#f0f0f0;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;height:100dvh;overflow:hidden;background:#000;color:var(--text);
  font-family:'Noto Sans TC',sans-serif;touch-action:manipulation;}
/* 桌面/筆電大螢幕：整體限制成手機比例置中顯示，圖片不會被拉伸變形或超出範圍 */
.screen{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;overflow-y:auto;padding-top:max(24px,env(safe-area-inset-top));padding-bottom:max(24px,env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);}
@media (min-width:481px){
  .screen{box-shadow:0 0 60px rgba(0,0,0,.6);border-left:1px solid rgba(255,255,255,.08);border-right:1px solid rgba(255,255,255,.08);}
}
.screen.active{display:flex;}

/* ══ SETUP ══ */
#s-setup{gap:0;padding:0;justify-content:flex-start;overflow-y:auto;overflow-x:hidden;
  background:linear-gradient(145deg,#0d0221 0%,#1a0440 40%,#071830 100%);}
#s-setup::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 15% 15%,rgba(255,60,200,.22) 0%,transparent 55%),
             radial-gradient(ellipse at 85% 75%,rgba(60,130,255,.2) 0%,transparent 55%),
             radial-gradient(ellipse at 50% 50%,rgba(120,60,255,.1) 0%,transparent 70%);}
.setup-hero{width:100%;padding:24px 24px 12px;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,9vw,3.8rem);
  letter-spacing:.06em;line-height:1.1;text-align:center;
  background:linear-gradient(135deg,#ff6ef7 0%,#fffb80 50%,#6ee7ff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 20px rgba(200,80,255,.4));
  padding:0 8px;}
.tagline{color:rgba(255,255,255,.55);font-size:.82rem;letter-spacing:.04em;text-align:center;padding:0 16px;}
.setup-body{width:100%;flex:1;padding:0 16px 16px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:10px;position:relative;}
.setup-card{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.13);border-radius:24px;
  padding:16px;width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center;gap:10px;
  overflow-y:auto;}
.setup-label{color:rgba(255,255,255,.4);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;}
.count-row{display:flex;align-items:center;gap:28px;}
.c-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.07);color:#fff;font-size:1.4rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;}
.c-btn:active{background:rgba(255,255,255,.18);}
.c-num{font-family:'Bebas Neue',sans-serif;font-size:4rem;line-height:1;min-width:44px;text-align:center;
  background:linear-gradient(135deg,#ff6ef7,#fffb80);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.order-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.o-chip{padding:5px 13px;border-radius:20px;font-size:.75rem;
  border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.38);}
.o-chip.cur{background:linear-gradient(135deg,#c97bff,#ff6ef7);color:#fff;border-color:transparent;font-weight:700;}
.total-label{color:rgba(255,255,255,.38);font-size:.78rem;}
.total-label strong{color:rgba(255,255,255,.85);}
.btn-primary{background:linear-gradient(135deg,#c850ff 0%,#7b5cff 50%,#3dc8ff 100%);
  color:#fff;border:none;border-radius:14px;font-family:inherit;font-weight:900;
  font-size:1.1rem;letter-spacing:.06em;padding:14px 0;width:100%;max-width:340px;
  cursor:pointer;box-shadow:0 5px 20px rgba(150,80,255,.4);}
.btn-primary:active{transform:translateY(2px);}

/* ══ GAME ══ */
#s-game{padding:0;justify-content:flex-start;height:100%;height:100dvh;}
.photo-wrap-limit{width:100%;max-width:100vw;}
.top-strip{width:100%;background:var(--surface);border-bottom:1px solid var(--border);
  padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.ts-player{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--accent);letter-spacing:.04em;}
.ts-progress{color:var(--muted);font-size:.78rem;}
.ts-score{color:var(--muted);font-size:.78rem;text-align:right;}
.ts-score strong{color:var(--text);}
.prog-bar{width:100%;height:4px;background:var(--border);flex-shrink:0;}
.prog-fill{height:100%;background:var(--accent);transition:width .4s;}

/* photo */
.photo-area{width:100%;position:relative;background:#111;overflow:hidden;flex:1 1 0;min-height:0;}
.photo-area img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#0a0a0f;display:block;transition:opacity 0.2s;}
.photo-area .load-overlay,.photo-area .countdown-ring,.photo-area .blur-overlay{position:absolute;}
.load-overlay{position:absolute;inset:0;background:rgba(10,10,15,.88);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted);font-size:.88rem;z-index:2;}
.load-overlay.hidden{display:none;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* countdown ring on photo - 移到右上角，不擋住人物臉部 */
.ring-wrap-outer{position:absolute;top:12px;right:12px;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:3;}
.ring-wrap{position:relative;width:58px;height:58px;}
.ring-wrap svg{position:absolute;inset:0;transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:rgba(0,0,0,.4);stroke-width:6;}
.ring-fg{fill:none;stroke:var(--green);stroke-width:6;stroke-linecap:round;stroke-dasharray:201;stroke-dashoffset:0;transition:stroke .3s;}
.ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.9);
  background:rgba(0,0,0,.35);border-radius:50%;}
.ring-wrap-outer.hidden{display:none;}

/* mini turns */
.mini-turns{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;padding:6px 12px 4px;flex-shrink:0;}
.mt-chip{padding:3px 10px;border-radius:20px;font-size:.72rem;border:1px solid var(--border);color:var(--muted);}
.mt-chip.cur{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.mt-chip.done{opacity:.3;text-decoration:line-through;}

/* judge buttons */
.judge-area{width:100%;display:flex;gap:10px;padding:10px 14px max(16px,env(safe-area-inset-bottom));flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);}
.judge-area.hidden{display:none;}
.j-btn{flex:1;border:none;border-radius:16px;font-family:inherit;font-weight:900;
  font-size:1.4rem;padding:18px 10px;cursor:pointer;letter-spacing:.02em;transition:transform .1s,filter .1s;}
.j-btn:active{transform:scale(.96);}
.j-correct{background:var(--green);color:#000;box-shadow:0 5px 0 #1a7a43;}
.j-wrong{background:var(--red);color:#fff;box-shadow:0 5px 0 #991a2e;}
.j-hint{background:var(--surface);color:var(--accent);border:1.5px solid var(--accent);
  font-size:.8rem;padding:10px 6px;flex:0 0 56px;border-radius:12px;font-weight:700;}
.j-hint:disabled{opacity:.3;cursor:default;}

/* ══ REVEAL ══ */
#s-reveal{gap:14px;background:rgba(10,10,15,.97);}
.rev-label{color:var(--muted);font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;}
.rev-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,12vw,5.5rem);
  color:var(--accent);letter-spacing:.05em;text-align:center;text-shadow:0 0 40px rgba(240,224,64,.4);line-height:1;}
.rev-zh{color:rgba(255,255,255,.5);font-size:1rem;letter-spacing:.05em;margin-top:-4px;}
.rev-pts{color:var(--green);font-size:.95rem;font-weight:700;}
.rev-next{color:var(--muted);font-size:.8rem;text-align:center;margin-top:4px;}
.tap-hint{color:rgba(255,255,255,.25);font-size:.72rem;margin-top:12px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:.25;}50%{opacity:.6;}}

/* ══ FAIL ══ */
#s-fail{gap:18px;background:linear-gradient(160deg,#8b0000,#ff1a1a);}
.fail-emoji{font-size:4rem;}
.fail-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,13vw,5rem);color:#fff;letter-spacing:.05em;text-align:center;line-height:1;}
.fail-ans{color:rgba(255,255,255,.88);font-size:.92rem;text-align:center;line-height:1.8;}
.fail-ans strong{color:#fff;font-size:1.05rem;}
.btn-retry{background:#fff;color:#000;border:none;border-radius:14px;font-family:inherit;
  font-weight:900;font-size:1.1rem;padding:18px 0;width:100%;max-width:300px;cursor:pointer;}
.btn-retry:active{opacity:.85;}

/* ══ RESULT ══ */
#s-result{gap:16px;padding-top:36px;padding-bottom:36px;overflow-y:auto;}
.res-title{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--accent);letter-spacing:.05em;}
.podium{display:flex;gap:10px;width:100%;max-width:360px;}
.pod{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 8px;text-align:center;}
.pod.gold{border-color:var(--accent);box-shadow:0 0 20px rgba(240,224,64,.2);}
.pod-m{font-size:1.4rem;margin-bottom:4px;}
.pod-n{font-weight:700;font-size:.82rem;margin-bottom:2px;}
.pod-p{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;color:var(--accent);}
.pod-c{color:var(--muted);font-size:.7rem;}
.sb{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.sb-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px;font-size:.86rem;}
.sb-row:last-child{border-bottom:none;}
.sb-r{color:var(--muted);width:20px;font-size:.75rem;}
.sb-n{flex:1;font-weight:700;}
.sb-c{color:var(--green);font-size:.75rem;}
.sb-p{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--accent);}
.ar-section{width:100%;max-width:360px;}
.ar-title{color:var(--muted);font-size:.72rem;letter-spacing:.1em;text-align:center;margin-bottom:8px;}
.ar-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;margin-bottom:6px;}
.ar-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.ar-dot.ok{background:var(--green);}
.ar-dot.no{background:var(--red);}
.ar-names{flex:1;}
.ar-en{font-weight:700;font-size:.84rem;}
.ar-zh{color:var(--muted);font-size:.73rem;margin-top:1px;}
.ar-who{color:var(--muted);font-size:.73rem;flex-shrink:0;}
</style>
</head>
<body>

<!-- SETUP -->
<div class="screen active" id="s-setup">
  <div class="setup-hero">
    <div class="logo">認臉大作戰</div>
    <div class="tagline">😵 你到底認不認識這張臉？</div>
  </div>
  <div class="setup-body">
    <div class="setup-card">

      <!-- 難度模式 -->
      <div class="setup-label">難度模式</div>
      <div style="display:flex;gap:8px;width:100%;">
        <button id="mode-hard" onclick="setMode('hard')" style="flex:1;padding:9px 6px;border-radius:10px;border:2px solid #c850ff;background:linear-gradient(135deg,#c850ff,#7b5cff);color:#fff;font-family:inherit;font-weight:900;font-size:.76rem;cursor:pointer;line-height:1.3;">
          💥 挑戰<br><span style="font-weight:400;font-size:.65rem;opacity:.85">答錯全部重來</span>
        </button>
        <button id="mode-easy" onclick="setMode('easy')" style="flex:1;padding:9px 6px;border-radius:10px;border:2px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);font-family:inherit;font-weight:900;font-size:.76rem;cursor:pointer;line-height:1.3;">
          😊 輕鬆<br><span style="font-weight:400;font-size:.65rem;opacity:.85">答錯繼續下題</span>
        </button>
      </div>

      <!-- 個人 / 團隊 -->
      <div class="setup-label" style="margin-top:6px;">賽制</div>
      <div style="display:flex;gap:8px;width:100%;">
        <button id="type-solo" onclick="setType('solo')" style="flex:1;padding:9px 6px;border-radius:10px;border:2px solid #3dc8ff;background:linear-gradient(135deg,#3dc8ff,#7b5cff);color:#fff;font-family:inherit;font-weight:900;font-size:.76rem;cursor:pointer;line-height:1.3;">
          🧍 個人賽<br><span style="font-weight:400;font-size:.65rem;opacity:.85">各自計分</span>
        </button>
        <button id="type-team" onclick="setType('team')" style="flex:1;padding:9px 6px;border-radius:10px;border:2px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);font-family:inherit;font-weight:900;font-size:.76rem;cursor:pointer;line-height:1.3;">
          👥 團隊賽<br><span style="font-weight:400;font-size:.65rem;opacity:.85">隊伍總分</span>
        </button>
      </div>

      <!-- 觀看時間 -->
      <div class="setup-label" style="margin-top:6px;">觀看時間</div>
      <div style="display:flex;gap:8px;width:100%;">
        <button id="time-3" onclick="setPhotoSecs(3)" style="flex:1;padding:8px 4px;border-radius:10px;border:2px solid #2ecc71;background:linear-gradient(135deg,#2ecc71,#3dc8ff);color:#fff;font-family:inherit;font-weight:900;font-size:.76rem;cursor:pointer;">3秒</button>
        <button id="time-5" onclick="setPhotoSecs(5)" style="flex:1;padding:8px 4px;border-radius:10px;border:2px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);font-family:inherit;font-weight:900;font-size:.76rem;cursor:pointer;">5秒</button>
        <button id="time-8" onclick="setPhotoSecs(8)" style="flex:1;padding:8px 4px;border-radius:10px;border:2px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);font-family:inherit;font-weight:900;font-size:.76rem;cursor:pointer;">8秒</button>
      </div>

      <!-- 每人答題輪數 -->
      <div class="setup-label" style="margin-top:6px;">每人答題輪數</div>
      <div style="display:flex;gap:8px;width:100%;">
        <button id="rounds-2" onclick="setRounds(2)" style="flex:1;padding:8px 4px;border-radius:10px;border:2px solid #ff5c93;background:linear-gradient(135deg,#ff5c93,#7b5cff);color:#fff;font-family:inherit;font-weight:900;font-size:.76rem;cursor:pointer;">2輪</button>
        <button id="rounds-3" onclick="setRounds(3)" style="flex:1;padding:8px 4px;border-radius:10px;border:2px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);font-family:inherit;font-weight:900;font-size:.76rem;cursor:pointer;">3輪</button>
        <button id="rounds-4" onclick="setRounds(4)" style="flex:1;padding:8px 4px;border-radius:10px;border:2px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);font-family:inherit;font-weight:900;font-size:.76rem;cursor:pointer;">4輪</button>
        <button id="rounds-5" onclick="setRounds(5)" style="flex:1;padding:8px 4px;border-radius:10px;border:2px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);font-family:inherit;font-weight:900;font-size:.76rem;cursor:pointer;">5輪</button>
      </div>

      <!-- 題目主題 -->
      <div class="setup-label" style="margin-top:6px;">題目主題</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;width:100%;">
        <button id="cat-all" onclick="setCategory('all')" style="padding:8px 4px;border-radius:10px;border:2px solid #f0e040;background:linear-gradient(135deg,#f0e040,#ff9500);color:#fff;font-family:inherit;font-weight:900;font-size:.72rem;cursor:pointer;">🌍 隨機綜合</button>
        <button id="cat-music" onclick="setCategory('music')" style="padding:8px 4px;border-radius:10px;border:2px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);font-family:inherit;font-weight:900;font-size:.72rem;cursor:pointer;">🎵 音樂歌手</button>
        <button id="cat-movie" onclick="setCategory('movie')" style="padding:8px 4px;border-radius:10px;border:2px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);font-family:inherit;font-weight:900;font-size:.72rem;cursor:pointer;">🎬 影視明星</button>
        <button id="cat-asia" onclick="setCategory('asia')" style="padding:8px 4px;border-radius:10px;border:2px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);font-family:inherit;font-weight:900;font-size:.72rem;cursor:pointer;">🌏 亞洲限定</button>
        <button id="cat-hktw" onclick="setCategory('hktw')" style="padding:8px 4px;border-radius:10px;border:2px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);font-family:inherit;font-weight:900;font-size:.72rem;cursor:pointer;">🎤 港台老中青</button>
        <button id="cat-idol" onclick="setCategory('idol')" style="padding:8px 4px;border-radius:10px;border:2px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);font-family:inherit;font-weight:900;font-size:.72rem;cursor:pointer;">✨ 日韓藝人</button>
      </div>

      <!-- 個人賽設定 -->
      <div id="solo-config">
        <div class="setup-label" style="margin-top:6px;">玩家人數</div>
        <div class="count-row">
          <button class="c-btn" onclick="chg(-1)">−</button>
          <div class="c-num" id="c-num">4</div>
          <button class="c-btn" onclick="chg(1)">+</button>
        </div>
        <div class="total-label" id="total-label"></div>
        <div class="order-chips" id="o-chips"></div>
      </div>

      <!-- 團隊賽設定 -->
      <div id="team-config" style="display:none;width:100%;">
        <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:8px;width:100%;align-items:center;">
          <!-- Team A -->
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(255,200,0,.08);border:1px solid rgba(255,200,0,.2);border-radius:12px;padding:10px 6px;">
            <div style="font-size:.68rem;letter-spacing:.08em;color:rgba(255,200,0,.9);font-weight:700;">🅐 隊伍 A</div>
            <div style="display:flex;align-items:center;gap:6px;">
              <button class="c-btn" onclick="chgTeam('a',-1)" style="width:36px;height:36px;font-size:1.2rem;">−</button>
              <div id="team-a-num" style="font-family:'Bebas Neue',sans-serif;font-size:2.8rem;line-height:1;background:linear-gradient(135deg,#ffe066,#ffb300);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;min-width:32px;text-align:center;">3</div>
              <button class="c-btn" onclick="chgTeam('a',1)" style="width:36px;height:36px;font-size:1.2rem;">+</button>
            </div>
            <div style="color:rgba(255,255,255,.4);font-size:.68rem;">人</div>
          </div>
          <!-- VS -->
          <div style="color:rgba(255,255,255,.3);font-size:1rem;font-weight:700;text-align:center;">VS</div>
          <!-- Team B -->
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(100,200,255,.08);border:1px solid rgba(100,200,255,.2);border-radius:12px;padding:10px 6px;">
            <div style="font-size:.68rem;letter-spacing:.08em;color:rgba(100,200,255,.9);font-weight:700;">🅑 隊伍 B</div>
            <div style="display:flex;align-items:center;gap:6px;">
              <button class="c-btn" onclick="chgTeam('b',-1)" style="width:36px;height:36px;font-size:1.2rem;">−</button>

function buildOrder(n, rounds){
  // 每位玩家輪流答相同題數，確保隊伍人數不同也不會有人多答或少答

  const order = [];
  for(let r=0; r<rounds; r++){
    for(let i=0; i<n; i++) order.push(i);
  }
  return order;
}

// ── 1. 優化後的圖片取得：支援英/中雙語系維基百科交叉搜尋 ──
async function getCelebImg(celeb){
  const key = celeb.name;
  if(window._imgCache[key] !== undefined) return window._imgCache[key];
  if(celeb.img){ const r={src:celeb.img,isGroupFallback:false}; window._imgCache[key]=r; return r; }
  if(celeb.no_img){ const r={src:null,isGroupFallback:false}; window._imgCache[key]=r; return r; }

  // 帶逾時的fetch，避免網路慢時卡住整個流程
  async function fetchWithTimeout(url, ms){
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), ms);
    try {
      const r = await fetch(url, { signal: controller.signal, referrerPolicy: 'no-referrer' });
      clearTimeout(timer);
      return r;
    } catch(e) {
      clearTimeout(timer);
      throw e;
    }
  }

  async function tryWiki(lang, title, minSize){
    minSize = minSize || 150;
    try {
      const url = 'https://' + lang + '.wikipedia.org/w/api.php?action=query&titles=' + encodeURIComponent(title) + '&prop=pageimages&format=json&pithumbsize=800&origin=*';
      const r = await fetchWithTimeout(url, 5000);
      if(!r.ok) return null;
      const d = await r.json();
      const pages = d?.query?.pages || {};
      const badWords = ['Incognito','Question_mark','Disambig','Flag_of','Coat_of','logo','Logo','Seal_of','_map','Map_of','icon','Icon','Emblem','symbol','Symbol','Madame_Tussauds','waxwork','Waxwork'];
      for(const pid in pages){
        const thumb = pages[pid]?.thumbnail;
        const src = thumb?.source;
        if(!src) continue;
        if(badWords.some(w => src.includes(w))) continue;
        // 過濾太小的縮圖（通常是icon/徽章，不是真實人像照）；團體照要求更高解析度，確保多人合照仍清晰可辨
        const w = thumb?.width || 0, h = thumb?.height || 0;
        if(w && h && (w < minSize || h < minSize)) continue;
        return src;
      }
    } catch(e) {}
    return null;
  }

  const minSize = celeb.is_group ? 300 : 150;

  // 第一步：優先用中文名查中文維基（繁體），台灣使用者最準確的來源
  let src = null;
  if (celeb.zh_wiki) src = await tryWiki('zh', celeb.zh_wiki, minSize);
  if (!src && celeb.zh) src = await tryWiki('zh', celeb.zh, minSize);
  // 第二步：用 wiki 標題查英文維基（補充中文維基沒有的人物）
  if (!src && celeb.wiki) src = await tryWiki('en', celeb.wiki, minSize);
  // 第三步：用英文名字直接查（標題可能跟wiki欄位不同）
  if (!src) src = await tryWiki('en', celeb.name.replace(/\s+/g, '_'), minSize);
  // 搜尋API已移除：容易抓到名稱相近但不是同一人的條目，導致圖文錯配

  // 個人照片找不到時直接顯示提示卡，絕不退回團體合照（避免答案是個人卻配上多人照片造成混淆）
  const isGroupFallback = false;

  const result = { src: src || null, isGroupFallback };
  window._imgCache[key] = result;
  return result;
}

// ── 2. AI 生成全球古今中外名人題庫 ──
async function generateCelebList(count){
  const used = [...window._aiUsed].join(', ');
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:2000,
        system:'你是全球歷史與現代名人百科題庫。請回傳恰好' + count + '個知名人物的JSON陣列。職業跨度必須極廣（包含但不限於：科學家、歷史帝王、政治家、哲學家、文學家、當代運動員、好萊塢或亞洲巨星、藝術家、企業家等）。格式：[{"name":"英文全名","zh":"繁體中文譯名","hint":"一句精彩的中文身分線索（不可透露姓名，但要具備故事性）","wiki":"此人在英文維基百科正確的個人條目名稱（例如: Alexander_the_Great, Albert_Einstein）"}]。過濾規則：絕對不要重複出現以下人物：' + (used||'無') + '。只回傳JSON陣列，不要任何多餘文字。',
        messages:[{role:'user',content:'請生成' + count + '個全球古今中外知名人物。'}]
      })
    });
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const m = text.match(/\[[\s\S]*\]/);
    if(m){
      const parsed = JSON.parse(m[0]);
      if(Array.isArray(parsed) && parsed.length >= count){
        const result = parsed.slice(0, count);
        result.forEach(c => window._aiUsed.add(c.name));
        return result;
      }
    }
  } catch(e) { console.log('AI list generation failed:', e); }
  const avail = shuffle(CELEBS.filter(c => !window._aiUsed.has(c.name)));
  const pool = avail.length >= count ? avail : shuffle([...CELEBS]);
  const result = pool.slice(0, count);
  result.forEach(c => window._aiUsed.add(c.name));
  return result;
}

// ── 3. 遊戲開始 ──
async function startGame(){
  // 解鎖音效（iOS Safari需要使用者互動才能播放音效）
  const ctx = getAudioCtx();
  if(ctx && ctx.state === 'suspended') ctx.resume();
  if(gameType==='team'){
    playerCount=teamA+teamB;
    teamOf=Array.from({length:playerCount},(_,i)=>i<teamA?'A':'B');
    teamScores={A:0,B:0}; teamCorrect={A:0,B:0};
  }
  turnOrder=buildOrder(playerCount, gameRounds);
  playerScores=Array(playerCount).fill(0);
  playerCorrect=Array(playerCount).fill(0);
  results=[];
  currentQ=0;
  showScreen('s-game');
  // 依主題篩選題庫
  function matchCategory(c){
    if(curCategory==='all') return true;
    if(curCategory==='asia') return !!c.asia;
    if(curCategory==='hktw') return !!c.hktw;
    if(curCategory==='idol') return !!c.idol;
    return (c.cats||[]).includes(curCategory);
  }
  const filtered = CELEBS.filter(matchCategory);
  const basePool = filtered.length >= turnOrder.length ? filtered : CELEBS;

  // 顯示準備畫面：開賽前先批次（平行）驗證圖片是否存在，確保遊戲開始後絕不卡圖
  const loadOv = document.getElementById('load-ov');
  loadOv.innerHTML = '<div class="spinner"></div><span>正在準備題目與照片…</span>';
  loadOv.className = 'load-overlay';
  document.getElementById('ts-prog').textContent = '';

  const shuffledPool = shuffle([...basePool]);
  const need = turnOrder.length;
  const verified = [];
  const usedNames = new Set();
  const BATCH_SIZE = 10; // 每批同時平行驗證10人，大幅縮短總等待時間
  const HARD_TIME_LIMIT = 12000; // 整體驗證最多12秒，絕不讓使用者等更久
  const startTime = Date.now();

  // 為每批驗證加上硬性逾時保護：即使單個人查圖卡住，這批最多等6秒就放棄繼續下一批
  function withBatchTimeout(promises, ms){
    return Promise.all(promises.map(p =>
      Promise.race([
        p,
        new Promise(resolve => setTimeout(() => resolve({src:null,isGroupFallback:false}), ms))
      ])
    ));
  }

  let cursor = 0;
  while(verified.length < need && cursor < shuffledPool.length && (Date.now() - startTime) < HARD_TIME_LIMIT){
    const batch = shuffledPool.slice(cursor, cursor + BATCH_SIZE);
    cursor += BATCH_SIZE;
    const batchCandidates = batch.filter(c => !usedNames.has(c.name));
    if(batchCandidates.length === 0) continue;

    // 平行驗證這一批，每批最多等6秒，不互相阻塞也不無限期拖累整體流程
    const results = await withBatchTimeout(batchCandidates.map(c => getCelebImg(c)), 4000);
    batchCandidates.forEach((c, i) => {
      usedNames.add(c.name);
      if(results[i] && results[i].src && verified.length < need){
        verified.push(c);
      }
    });
    loadOv.querySelector('span').textContent = '正在準備題目與照片…(' + verified.length + '/' + need + ')';
  }

  // 若時間到或池子掃完仍不足，從全部CELEBS平行補足一輪，仍受時間上限保護
  if(verified.length < need){
    const fallbackPool = shuffle([...CELEBS]).filter(c => !usedNames.has(c.name));
    let fIdx = 0;
    while(verified.length < need && fIdx < fallbackPool.length && (Date.now() - startTime) < HARD_TIME_LIMIT){
      const batch = fallbackPool.slice(fIdx, fIdx + BATCH_SIZE);
      fIdx += BATCH_SIZE;
      const results = await withBatchTimeout(batch.map(c => getCelebImg(c)), 4000);
      batch.forEach((c, i) => {
        if(results[i] && results[i].src && verified.length < need) verified.push(c);
      });
    }
  }

  // 最終保險：時間到了還是不足，直接用已驗證到的人數開賽（buildOrder已用原本turnOrder.length計算，
  // 此處若人數不足會在loadQuestion自然結束時統計，不會讓使用者無限期等待）
  questions = verified.slice(0, need);
  if(questions.length === 0){
    // 極端邊緣情況：完全沒有人通過驗證，直接退回原始隨機池，loadQuestion自身仍有6秒安全網
    questions = shuffledPool.slice(0, need);
  }
  // 安全防護：若實際驗證到的題目數少於原本預計的輪數，裁切turnOrder避免存取超出範圍導致崩潰/黑畫面
  if(questions.length < turnOrder.length){
    turnOrder = turnOrder.slice(0, questions.length);
  }

  loadQuestion();
}

// ── 4. 載入題目與圖片 ──
async function loadQuestion(){
  clearInterval(photoTimer);
  hintUsed = false; phase = 'showing';
  const q = questions[currentQ];
  const pIdx = turnOrder[currentQ];
  const teamLabel = gameType === 'team' ? ' (隊伍 ' + teamOf[pIdx] + ')' : '';
  document.getElementById('ts-player').textContent = '玩家 ' + (pIdx+1) + teamLabel;
  document.getElementById('ts-prog').textContent = (currentQ+1) + ' / ' + turnOrder.length;
  document.getElementById('ts-score').textContent = playerScores[pIdx];
  document.getElementById('prog-fill').style.width = (currentQ/turnOrder.length*100) + '%';

  const img = document.getElementById('celeb-img');
  img.style.display = 'none'; img.src = '';
  const loadOv = document.getElementById('load-ov');
  loadOv.innerHTML = '<div class="spinner"></div><span>正在搜索名人的面孔…</span>';
  loadOv.className = 'load-overlay';
  document.getElementById('ring-outer').className = 'ring-wrap-outer hidden';
  document.getElementById('judge-area').className = 'judge-area hidden';
  document.getElementById('hint-btn').disabled = false;
  renderMiniTurns();

  const abortToken = (window._gameAborted || 0);

  // 整體安全網：getCelebImg最多等6秒，逾時就視為沒圖，絕不卡住遊戲
  const imgResult = await Promise.race([
    getCelebImg(q),
    new Promise(resolve => setTimeout(() => resolve({src:null,isGroupFallback:false}), 6000))
  ]);
  if((window._gameAborted||0) !== abortToken) return;
  const src = imgResult?.src;
  const isGroupFallback = imgResult?.isGroupFallback;

  const triggerStart = () => {
    if((window._gameAborted||0) !== abortToken) return;
    loadOv.className = 'load-overlay hidden';
    startPhotoCountdown();
  };

  const showFallbackCard = (icon, title) => {
    loadOv.innerHTML = '<div style="text-align:center;padding:24px;background:rgba(20,20,35,0.85);border-radius:20px;border:1px solid var(--border);max-width:300px;"><div style="font-size:3rem;margin-bottom:8px;">' + icon + '</div><div style="color:var(--accent);font-size:1.1rem;font-weight:bold;margin-bottom:8px;">' + title + '</div><div style="color:rgba(255,255,255,0.75);font-size:.85rem;line-height:1.5;">💡 ' + q.hint + '</div></div>';
    triggerStart();
  };

  // 團體照退回機制已移除，此處無需再操作標籤元素

  if(src){
    img.src = src;
    let imgSettled = false;
    // 圖片載入安全網：最多等6秒（手機網路較不穩定，放寬時間），逾時就放棄圖片改顯示提示卡，絕不卡住
    const imgTimeoutId = setTimeout(() => {
      if(!imgSettled){ imgSettled = true; showFallbackCard('👤','神祕人物'); }
    }, 6000);
    img.onload = () => {
      if(imgSettled) return;
      imgSettled = true; clearTimeout(imgTimeoutId);
      img.style.display = 'block'; triggerStart();
    };
    img.onerror = () => {
      if(imgSettled) return;
      imgSettled = true; clearTimeout(imgTimeoutId);
      showFallbackCard('👤','神祕人物');
    };
  } else {
    showFallbackCard('🕵️','智力考驗關卡');
  }

  if(currentQ+1 < questions.length) getCelebImg(questions[currentQ+1]);
}


// ── 音效（用 Web Audio API 合成，不需外部音檔）──
let _audioCtx = null;
function getAudioCtx(){
  if(!_audioCtx){
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){ return null; }
  }
  return _audioCtx;
}
function playBeep(freq, duration, volume){
  const ctx = getAudioCtx();
  if(!ctx) return;
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.value = volume || 0.15;
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}
function playTick(){ playBeep(880, 0.08, 0.12); }
function playFinalBuzz(){ playBeep(440, 0.35, 0.18); }
function playClick(){ playBeep(620, 0.06, 0.08); }
function playCorrect(){
  playBeep(660, 0.1, 0.15);
  setTimeout(()=>playBeep(880, 0.15, 0.15), 90);
}
function playWrong(){ playBeep(220, 0.25, 0.16); }

// 全域按鈕點擊音效：所有按鈕點擊都會發出輕快的「咔」聲，增加互動感
document.addEventListener('click', (e)=>{
  const btn = e.target.closest('button');
  if(!btn) return;
  if(btn.onclick && btn.getAttribute('onclick') && btn.getAttribute('onclick').includes('judge(true)')){
    playCorrect();
  } else if(btn.getAttribute('onclick') && btn.getAttribute('onclick').includes('judge(false)')){
    playWrong();
  } else {
    playClick();
  }
}, true);

function startPhotoCountdown(){
  document.getElementById('ring-outer').className='ring-wrap-outer';
  let left=photoSecs;
  let lastWholeSec = Math.ceil(left);
  updateRing(left);
  photoTimer=setInterval(()=>{
    left-=0.05;updateRing(left);
    const curWholeSec = Math.ceil(left);
    if(curWholeSec !== lastWholeSec && curWholeSec >= 0){
      lastWholeSec = curWholeSec;
      if(curWholeSec > 0) playTick();
    }
    if(left<=0){clearInterval(photoTimer);playFinalBuzz();showJudge();}
  },50);
}
function updateRing(left){
  const pct=Math.max(0,left/photoSecs);
  document.getElementById('ring-fg').style.strokeDashoffset=CIRC*(1-pct);
  document.getElementById('ring-num').textContent=Math.ceil(left);
  document.getElementById('ring-fg').style.stroke=pct>0.6?'var(--green)':pct>0.3?'var(--accent)':'var(--red)';
}
function showJudge(){
  phase='judging';
  const img=document.getElementById('celeb-img');
  img.style.transition='opacity 0.15s';img.style.opacity='0';
  setTimeout(()=>{img.style.display='none';img.style.opacity='1';img.style.transition='';},150);
  document.getElementById('ring-outer').className='ring-wrap-outer hidden';
  document.getElementById('load-ov').innerHTML='<div style="font-family:Bebas Neue,sans-serif;font-size:1.8rem;color:var(--accent);">玩家 '+(turnOrder[currentQ]+1)+'</div><div style="color:var(--muted);font-size:.85rem;">你知道是誰嗎？大聲說出來！</div>';
  document.getElementById('load-ov').className='load-overlay';
  document.getElementById('judge-area').className='judge-area';
}
function useHint(){
  if(hintUsed) return;
  hintUsed=true;
  document.getElementById('hint-btn').disabled=true;
  const q=questions[currentQ];
  const img=document.getElementById('celeb-img');
  if(img.src&&img.src!==window.location.href) img.style.display='block';
  document.getElementById('load-ov').innerHTML='<div style="background:rgba(0,0,0,.75);padding:12px 20px;border-radius:10px;text-align:center;max-width:280px;"><div style="color:var(--accent);font-size:.75rem;margin-bottom:4px;">💡 提示</div><div style="color:#fff;font-size:.9rem;line-height:1.5;">'+q.hint+'</div></div>';
  document.getElementById('load-ov').className='load-overlay';
}
function judge(correct){
  if(phase!=='judging') return;
  phase='';
  const q=questions[currentQ];
  const pIdx=turnOrder[currentQ];
  if(correct){
    const pts=100-(hintUsed?20:0);
    playerScores[pIdx]+=pts;playerCorrect[pIdx]++;
    if(gameType==='team'){const t=teamOf[pIdx];teamScores[t]+=pts;teamCorrect[t]++;}
    results.push({celeb:q,pIdx,correct:true});
    document.getElementById('rev-name').textContent=q.name;
    document.getElementById('rev-zh').textContent=q.zh;
    document.getElementById('rev-pts').textContent='✅ +'+pts+' 分  玩家'+(pIdx+1)+' 共 '+playerScores[pIdx]+' 分';
    const isLast=currentQ===turnOrder.length-1;
    document.getElementById('rev-next').textContent=isLast?'🎉 全部完成！':'下一題：玩家 '+(turnOrder[currentQ+1]+1);
    showScreen('s-reveal');
  }else{
    results.push({celeb:q,pIdx,correct:false});
    if(gameMode==='easy'){
      document.getElementById('rev-name').textContent=q.name;
      document.getElementById('rev-zh').textContent=q.zh;
      document.getElementById('rev-pts').innerHTML='<span style="color:var(--red)">❌ 答錯了，0分</span>';
      const isLast=currentQ===turnOrder.length-1;
      document.getElementById('rev-next').textContent=isLast?'🏁 遊戲結束！':'下一題：玩家 '+(turnOrder[currentQ+1]+1);
      showScreen('s-reveal');
    }else{
      document.getElementById('fail-ans').innerHTML='正確答案是 <strong>'+q.name+'</strong><br><span style="opacity:.7;font-size:.88rem">'+q.zh+'</span><br><br>全部分數歸零，重頭來過！';
      showScreen('s-fail');
    }
  }
}
function advance(){
  currentQ++;
  if(currentQ>=turnOrder.length) showResults();
  else{showScreen('s-game');loadQuestion();}
}
function restartRound(){
  results=[];
  playerScores=Array(playerCount).fill(0);
  playerCorrect=Array(playerCount).fill(0);
  currentQ=0;showScreen('s-game');loadQuestion();
}
function renderMiniTurns(){
  document.getElementById('mini-turns').innerHTML=turnOrder.map((p,i)=>{
    let c='mt-chip';
    if(i===currentQ) c+=' cur';
    else if(i<currentQ) c+=' done';
    return '<span class="'+c+'">'+(p+1)+'</span>';
  }).join('');
}
function showResults(){
  const ranked=Array.from({length:playerCount},(_,i)=>i).sort((a,b)=>playerScores[b]-playerScores[a]);
  const medals=['🥇','🥈','🥉'];
  if(gameType==='team'){
    const aWin=teamScores.A>=teamScores.B;
    document.getElementById('podium').innerHTML='<div class="pod'+(aWin?' gold':'')+'" style="border-color:rgba(255,200,0,.6)"><div class="pod-m">'+(aWin?'🏆':'')+'</div><div class="pod-n" style="color:rgba(255,200,0,.9)">🅐 隊伍 A</div><div class="pod-p">'+teamScores.A+'</div><div class="pod-c">答對 '+teamCorrect.A+' 題</div></div><div style="display:flex;align-items:center;color:rgba(255,255,255,.3);font-size:1.2rem;">VS</div><div class="pod'+(!aWin?' gold':'')+'" style="border-color:rgba(100,200,255,.6)"><div class="pod-m">'+(!aWin?'🏆':'')+'</div><div class="pod-n" style="color:rgba(100,200,255,.9)">🅑 隊伍 B</div><div class="pod-p">'+teamScores.B+'</div><div class="pod-c">答對 '+teamCorrect.B+' 題</div></div>';
    document.getElementById('sb').innerHTML=ranked.map((p,i)=>{const t=teamOf[p];const col=t==='A'?'rgba(255,200,0,.8)':'rgba(100,200,255,.8)';return '<div class="sb-row"><div class="sb-r">'+(i+1)+'</div><div class="sb-n">玩家 '+(p+1)+' <span style="font-size:.72rem;color:'+col+'">隊伍'+t+'</span></div><div class="sb-c">✓ '+playerCorrect[p]+' 題</div><div class="sb-p">'+playerScores[p]+'</div></div>';}).join('');
  }else{
    document.getElementById('podium').innerHTML=ranked.slice(0,Math.min(3,playerCount)).map((p,i)=>'<div class="pod'+(i===0?' gold':'')+'"><div class="pod-m">'+(medals[i]||'')+'</div><div class="pod-n">玩家 '+(p+1)+'</div><div class="pod-p">'+playerScores[p]+'</div><div class="pod-c">答對 '+playerCorrect[p]+' 題</div></div>').join('');
    document.getElementById('sb').innerHTML=ranked.map((p,i)=>'<div class="sb-row"><div class="sb-r">'+(i+1)+'</div><div class="sb-n">玩家 '+(p+1)+'</div><div class="sb-c">✓ '+playerCorrect[p]+' 題</div><div class="sb-p">'+playerScores[p]+'</div></div>').join('');
  }
  document.getElementById('ar-list').innerHTML=results.map(r=>'<div class="ar-row"><div class="ar-dot '+(r.correct?'ok':'no')+'"></div><div class="ar-names"><div class="ar-en">'+r.celeb.name+'</div><div class="ar-zh">'+r.celeb.zh+'</div></div><div class="ar-who">玩家'+(r.pIdx+1)+'</div></div>').join('');
  showScreen('s-result');
}
function resetAll(){
  window._gameAborted=(window._gameAborted||0)+1;
  clearInterval(photoTimer);clearInterval(typeTimer);
  phase='';
  const img=document.getElementById('celeb-img');
  if(img){img.src='';img.style.display='none';}
  const lo=document.getElementById('load-ov');
  if(lo) lo.className='load-overlay hidden';
  playerCount=4;renderSetup();showScreen('s-setup');
}
function confirmHome(){
  if(window.confirm('確定要返回首頁？目前進度會消失。')) resetAll();
}

renderSetup();
</script>
